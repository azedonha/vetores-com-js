<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Cadastro de Nomes</h1>
    <button onclick="cadastrarNomes()">Cadastrar Nomes</button>
    <button>Mostrar Nomes</button>

    <script>
        let nomes = [ ]

        function cadastrarNomes(){
            nomes = [ ] // limpa o vetor

            for(let i = 0; i < 3; i++){
                let nome = prompt("Digite o nome " + (i+1) + ":")
                nomes.push(nome); // inclui o nome noo vetor

            }

            alert("Nomes cadastrados com sucesso!")
        }

        functionmostrarNomes(){
            let texto = ""

            for(let i = 0; i < 3; i++){
                texto += + nomes[i] + '<br>'
            }

            document.getElementsById("resultado").innerHTML = texto;
        }
    </script>


</body>
</html>
